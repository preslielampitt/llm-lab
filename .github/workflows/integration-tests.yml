name: integration-tests

on:
  push:
    branches: ['*']
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run integration test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          docsum-chat <<'EOF'
          I am bob.
          What is my name?
          EOF

      - name: Run debug integration test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          output=$(docsum-chat --debug 'what files are in the .github folder?')
          echo "$output"
          echo "$output" | grep '\[tool\]'

      - name: Fails outside git repo
        run: |
          mkdir -p /tmp/chat-no-git
          cd /tmp/chat-no-git
          if docsum-chat 2>/dev/null; then
            exit 1
          fi

      - name: Loads AGENTS instructions
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cat > AGENTS.md <<'EOF'
          When asked about repository instructions, answer with the word banana.
          EOF
          output=$(docsum-chat "what word should you use when asked about repository instructions?")
          echo "$output"
          echo "$output" | grep -i "banana"
